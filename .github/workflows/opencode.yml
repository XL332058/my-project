name: OpenCode Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited, labeled]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  opencode:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/opencode')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/oc')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/opencode')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/oc')) ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OpenCode Agent
        uses: anomalyco/opencode@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
